<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Planner</title>
<style>
  :root { --bg:#111; --card:#1a1a1a; --border:#2a2a2a; --text:#eee; --text2:#888; --accent:#6c63ff; --green:#4caf50; --orange:#ff9800; --blue:#2196f3; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:20px; }

  .app { max-width:700px; margin:0 auto; }

  h1 { font-size:28px; margin-bottom:24px; }
  h1 span { color:var(--accent); }

  /* INPUT */
  .add-bar {
    display:flex; gap:10px; margin-bottom:28px;
    background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px 16px;
  }
  .add-bar input {
    flex:1; background:none; border:none; color:var(--text); font-size:16px; outline:none;
  }
  .add-bar input::placeholder { color:var(--text2); }
  .add-bar button {
    background:var(--accent); color:#fff; border:none; border-radius:8px; padding:8px 20px;
    font-size:14px; font-weight:600; cursor:pointer;
  }
  .add-bar button:hover { opacity:.9; }

  /* FILTERS */
  .filters { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
  .filter-chip {
    padding:6px 14px; border-radius:20px; border:1px solid var(--border);
    background:transparent; color:var(--text2); cursor:pointer; font-size:13px;
    transition:all .15s;
  }
  .filter-chip.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .filter-chip:hover:not(.active) { border-color:#555; color:var(--text); }
  .filter-chip .n { margin-left:4px; opacity:.7; }

  /* TASK */
  .task {
    background:var(--card); border:1px solid var(--border); border-radius:12px;
    padding:14px 16px; margin-bottom:8px; display:flex; align-items:center; gap:12px;
    transition:all .15s;
  }
  .task:hover { border-color:#444; }
  .task.done { opacity:.45; }
  .task.done .task-text { text-decoration:line-through; }

  .check {
    width:22px; height:22px; border-radius:50%; border:2px solid var(--border);
    cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center;
    transition:all .15s; font-size:12px;
  }
  .check:hover { border-color:var(--green); }
  .check.on { background:var(--green); border-color:var(--green); color:#fff; }

  .task-text { flex:1; font-size:15px; min-width:0; }

  .tag {
    padding:3px 10px; border-radius:12px; font-size:11px; font-weight:600;
    cursor:pointer; white-space:nowrap; user-select:none; transition:all .15s;
  }
  .tag-afazer { background:rgba(108,99,255,.15); color:var(--accent); }
  .tag-fazendo { background:rgba(255,152,0,.15); color:var(--orange); }
  .tag-feito { background:rgba(76,175,80,.15); color:var(--green); }

  .task-actions { display:flex; gap:4px; opacity:0; transition:opacity .15s; }
  .task:hover .task-actions { opacity:1; }
  .act-btn {
    width:28px; height:28px; border-radius:6px; background:var(--bg); border:1px solid var(--border);
    color:var(--text2); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:14px;
  }
  .act-btn:hover { color:var(--accent); border-color:var(--accent); }
  .act-btn.del:hover { color:#f44; border-color:#f44; }

  /* CALENDAR LINK */
  .cal-btn {
    padding:3px 8px; border-radius:6px; font-size:11px; background:rgba(33,150,243,.12);
    color:var(--blue); border:none; cursor:pointer; white-space:nowrap;
  }
  .cal-btn:hover { background:rgba(33,150,243,.25); }

  /* DATE POPUP */
  .date-row {
    display:none; gap:8px; align-items:center; margin-top:8px; padding:0 16px 14px;
  }
  .date-row.show { display:flex; }
  .date-row label { font-size:12px; color:var(--text2); }
  .date-row input {
    background:var(--card); border:1px solid var(--border); border-radius:8px;
    color:var(--text); padding:6px 10px; font-size:13px; outline:none;
  }
  .date-row input:focus { border-color:var(--accent); }

  .empty { text-align:center; padding:60px 20px; color:var(--text2); font-size:15px; }

  /* STATS */
  .stats { display:flex; gap:16px; margin-bottom:20px; font-size:13px; color:var(--text2); }
  .stats b { color:var(--text); }

  @media(max-width:600px) {
    body { padding:12px; }
    .task-actions { opacity:1; }
  }
</style>
</head>
<body>
<div class="app">
  <h1>Meu <span>Planner</span></h1>

  <div class="add-bar">
    <input type="text" id="input" placeholder="O que precisa fazer? Aperte Enter..." autofocus>
    <button onclick="addTask()">+</button>
  </div>

  <div class="filters" id="filters"></div>
  <div class="stats" id="stats"></div>
  <div id="list"></div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem('mp_tasks') || '[]');
let filter = 'todas';

const TAGS = ['A Fazer', 'Fazendo', 'Feito'];
const TAG_CLASS = {'A Fazer':'tag-afazer', 'Fazendo':'tag-fazendo', 'Feito':'tag-feito'};
const TAG_NEXT = {'A Fazer':'Fazendo', 'Fazendo':'Feito', 'Feito':'A Fazer'};

document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});

function save() { localStorage.setItem('mp_tasks', JSON.stringify(tasks)); }

function addTask() {
  const inp = document.getElementById('input');
  const text = inp.value.trim();
  if (!text) return;
  tasks.unshift({ id: Date.now().toString(36) + Math.random().toString(36).substr(2,4), text, tag: 'A Fazer', done: false, date: '', time: '' });
  save(); inp.value = ''; render();
}

function toggle(id) {
  const t = tasks.find(x => x.id === id);
  if (t) { t.done = !t.done; if (t.done) t.tag = 'Feito'; else t.tag = 'A Fazer'; save(); render(); }
}

function cycleTag(id) {
  const t = tasks.find(x => x.id === id);
  if (t) { t.tag = TAG_NEXT[t.tag] || 'A Fazer'; t.done = t.tag === 'Feito'; save(); render(); }
}

function remove(id) {
  tasks = tasks.filter(x => x.id !== id);
  save(); render();
}

function setDate(id, date, time) {
  const t = tasks.find(x => x.id === id);
  if (t) { t.date = date; t.time = time; save(); render(); }
}

function openGCal(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  let d = t.date ? t.date.replace(/-/g, '') : new Date().toISOString().slice(0,10).replace(/-/g,'');
  let timeStart = t.time ? t.time.replace(':','') + '00' : '090000';
  let h = parseInt(timeStart.substr(0,2));
  let timeEnd = String(h+1).padStart(2,'0') + timeStart.substr(2);
  const url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(t.text)}&dates=${d}T${timeStart}/${d}T${timeEnd}`;
  window.open(url, '_blank');
}

function downloadICS(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  let d = t.date || new Date().toISOString().slice(0,10);
  let dc = d.replace(/-/g,'');
  let ts = t.time ? t.time.replace(':','')+'00' : '090000';
  let h = parseInt(ts.substr(0,2));
  let te = String(h+1).padStart(2,'0') + ts.substr(2);
  let ics = `BEGIN:VCALENDAR\r\nVERSION:2.0\r\nBEGIN:VEVENT\r\nDTSTART:${dc}T${ts}\r\nDTEND:${dc}T${te}\r\nSUMMARY:${t.text}\r\nEND:VEVENT\r\nEND:VCALENDAR`;
  const blob = new Blob([ics], {type:'text/calendar'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = t.text.replace(/\s+/g,'-').substring(0,20) + '.ics';
  a.click();
}

function setFilter(f) { filter = f; render(); }

function render() {
  // Filters
  const counts = { todas: tasks.length };
  TAGS.forEach(tag => counts[tag] = tasks.filter(t => t.tag === tag).length);
  const fc = document.getElementById('filters');
  fc.innerHTML = ['todas', ...TAGS].map(f =>
    `<button class="filter-chip ${filter===f?'active':''}" onclick="setFilter('${f}')">${f === 'todas' ? 'Todas' : f}<span class="n">${counts[f]||0}</span></button>`
  ).join('');

  // Stats
  const done = tasks.filter(t => t.done).length;
  document.getElementById('stats').innerHTML = `<span><b>${tasks.length}</b> tarefas</span><span><b>${done}</b> feitas</span><span><b>${tasks.length - done}</b> pendentes</span>`;

  // List
  const filtered = filter === 'todas' ? tasks : tasks.filter(t => t.tag === filter);
  const list = document.getElementById('list');
  if (!filtered.length) { list.innerHTML = '<div class="empty">Nenhuma tarefa ainda. Digite acima e aperte Enter!</div>'; return; }

  list.innerHTML = filtered.map(t => `
    <div class="task ${t.done ? 'done' : ''}">
      <div class="check ${t.done ? 'on' : ''}" onclick="toggle('${t.id}')">${t.done ? '✓' : ''}</div>
      <span class="task-text">${esc(t.text)}</span>
      <span class="tag ${TAG_CLASS[t.tag]}" onclick="cycleTag('${t.id}')" title="Clique pra mudar">${t.tag}</span>
      ${t.date ? `<button class="cal-btn" onclick="openGCal('${t.id}')" title="Abrir no Google Calendar">📅 GCal</button>` : ''}
      ${t.date ? `<button class="cal-btn" onclick="downloadICS('${t.id}')" title="Baixar .ics pro Apple Calendar">🍎 iCal</button>` : ''}
      <div class="task-actions">
        <button class="act-btn" onclick="promptDate('${t.id}')" title="Agendar">📅</button>
        <button class="act-btn del" onclick="remove('${t.id}')" title="Remover">✕</button>
      </div>
    </div>
    <div class="date-row" id="dr-${t.id}">
      <label>Data:</label>
      <input type="date" id="dd-${t.id}" value="${t.date}" onchange="setDate('${t.id}', this.value, document.getElementById('dt-${t.id}').value)">
      <label>Hora:</label>
      <input type="time" id="dt-${t.id}" value="${t.time}" onchange="setDate('${t.id}', document.getElementById('dd-${t.id}').value, this.value)">
    </div>
  `).join('');
}

function promptDate(id) {
  const el = document.getElementById('dr-' + id);
  el.classList.toggle('show');
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

render();
</script>
</body>
</html>
