<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOOM</title>
<style>
  :root { --bg:#111; --card:#1a1a1a; --border:#2a2a2a; --text:#eee; --text2:#888; --accent:#6c63ff; --green:#4caf50; --orange:#ff9800; --blue:#2196f3; --red:#f44336; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:20px; }

  .app { max-width:700px; margin:0 auto; }

  h1 { font-size:28px; margin-bottom:24px; }
  h1 span { color:var(--accent); }

  /* INPUT */
  .add-bar {
    display:flex; gap:10px; margin-bottom:10px;
    background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px 16px;
  }
  .add-bar input {
    flex:1; background:none; border:none; color:var(--text); font-size:16px; outline:none;
  }
  .add-bar input::placeholder { color:var(--text2); }
  .add-bar button {
    background:var(--accent); color:#fff; border:none; border-radius:8px; padding:8px 20px;
    font-size:14px; font-weight:600; cursor:pointer;
  }
  .add-bar button:hover { opacity:.9; }

  /* RECURRENCE TOGGLE */
  .add-options {
    display:flex; gap:12px; align-items:center; margin-bottom:24px; padding:0 4px;
  }
  .opt-toggle {
    display:flex; align-items:center; gap:6px; font-size:13px; color:var(--text2); cursor:pointer; user-select:none;
  }
  .opt-toggle input { accent-color:var(--accent); cursor:pointer; }
  .opt-toggle:hover { color:var(--text); }
  .opt-toggle select {
    background:var(--card); border:1px solid var(--border); border-radius:6px; color:var(--text);
    padding:3px 6px; font-size:12px; outline:none;
  }

  /* FILTERS */
  .filters { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
  .filter-chip {
    padding:6px 14px; border-radius:20px; border:1px solid var(--border);
    background:transparent; color:var(--text2); cursor:pointer; font-size:13px;
    transition:all .15s;
  }
  .filter-chip.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .filter-chip:hover:not(.active) { border-color:#555; color:var(--text); }
  .filter-chip .n { margin-left:4px; opacity:.7; }

  /* TASK */
  .task-wrap { margin-bottom:8px; }
  .task {
    background:var(--card); border:1px solid var(--border); border-radius:12px;
    padding:14px 16px; display:flex; align-items:center; gap:12px;
    transition:all .15s;
  }
  .task:hover { border-color:#444; }
  .task.done { opacity:.45; }
  .task.done .task-text { text-decoration:line-through; }

  .check {
    width:22px; height:22px; border-radius:50%; border:2px solid var(--border);
    cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center;
    transition:all .15s; font-size:12px;
  }
  .check:hover { border-color:var(--green); }
  .check.on { background:var(--green); border-color:var(--green); color:#fff; }

  .task-body { flex:1; min-width:0; }
  .task-text { font-size:15px; }
  .task-meta { display:flex; gap:10px; margin-top:4px; font-size:11px; color:var(--text2); flex-wrap:wrap; align-items:center; }
  .task-meta .recur-badge {
    background:rgba(108,99,255,.15); color:var(--accent); padding:1px 7px; border-radius:8px; font-size:10px; font-weight:600;
  }
  .task-meta .tempo { color:var(--green); font-weight:600; }

  .tag {
    padding:3px 10px; border-radius:12px; font-size:11px; font-weight:600;
    cursor:pointer; white-space:nowrap; user-select:none; transition:all .15s;
  }
  .tag-afazer { background:rgba(108,99,255,.15); color:var(--accent); }
  .tag-fazendo { background:rgba(255,152,0,.15); color:var(--orange); }
  .tag-feito { background:rgba(76,175,80,.15); color:var(--green); }

  .task-actions { display:flex; gap:4px; opacity:0; transition:opacity .15s; }
  .task:hover .task-actions { opacity:1; }
  .act-btn {
    width:28px; height:28px; border-radius:6px; background:var(--bg); border:1px solid var(--border);
    color:var(--text2); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:14px;
  }
  .act-btn:hover { color:var(--accent); border-color:var(--accent); }
  .act-btn.del:hover { color:#f44; border-color:#f44; }

  /* CALENDAR LINK */
  .cal-btn {
    padding:3px 8px; border-radius:6px; font-size:11px; background:rgba(33,150,243,.12);
    color:var(--blue); border:none; cursor:pointer; white-space:nowrap;
  }
  .cal-btn:hover { background:rgba(33,150,243,.25); }

  /* DATE POPUP */
  .date-row {
    display:none; gap:8px; align-items:center; margin-top:8px; padding:0 16px 14px;
  }
  .date-row.show { display:flex; flex-wrap:wrap; }
  .date-row label { font-size:12px; color:var(--text2); }
  .date-row input {
    background:var(--card); border:1px solid var(--border); border-radius:8px;
    color:var(--text); padding:6px 10px; font-size:13px; outline:none;
  }
  .date-row input:focus { border-color:var(--accent); }

  .empty { text-align:center; padding:60px 20px; color:var(--text2); font-size:15px; }

  /* STATS */
  .stats { display:flex; gap:16px; margin-bottom:20px; font-size:13px; color:var(--text2); flex-wrap:wrap; }
  .stats b { color:var(--text); }

  @media(max-width:600px) {
    body { padding:12px; }
    .task-actions { opacity:1; }
  }
</style>
</head>
<body>
<div class="app">
  <h1><span>BOOM</span> <span style="font-size:14px;color:var(--text2);font-weight:400">get it done.</span></h1>

  <div class="add-bar">
    <input type="text" id="input" placeholder="What's next? Hit Enter..." autofocus>
    <button onclick="addTask()">+</button>
  </div>

  <div class="add-options">
    <label class="opt-toggle">
      <input type="checkbox" id="chkRecur"> Recorrente
    </label>
    <select id="selRecur" style="display:none">
      <option value="semanal">Semanal</option>
      <option value="quinzenal">Quinzenal</option>
      <option value="mensal">Mensal</option>
    </select>
  </div>

  <div class="filters" id="filters"></div>
  <div class="stats" id="stats"></div>
  <div id="list"></div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem('boom_tasks') || '[]');
let filter = 'todas';

const TAGS = ['A Fazer', 'Fazendo', 'Feito'];
const TAG_CLASS = {'A Fazer':'tag-afazer', 'Fazendo':'tag-fazendo', 'Feito':'tag-feito'};
const TAG_NEXT = {'A Fazer':'Fazendo', 'Fazendo':'Feito', 'Feito':'A Fazer'};

const RECUR_DAYS = { semanal:7, quinzenal:14, mensal:30 };

document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});

document.getElementById('chkRecur').addEventListener('change', function() {
  document.getElementById('selRecur').style.display = this.checked ? 'inline-block' : 'none';
});

function save() { localStorage.setItem('boom_tasks', JSON.stringify(tasks)); }

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'2-digit', hour:'2-digit', minute:'2-digit' });
}

function tempoExec(criado, concluido) {
  if (!criado || !concluido) return '';
  const ms = new Date(concluido) - new Date(criado);
  const mins = Math.floor(ms / 60000);
  if (mins < 60) return mins + 'min';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ' + (mins % 60) + 'min';
  const dias = Math.floor(hrs / 24);
  return dias + 'd ' + (hrs % 24) + 'h';
}

function addTask() {
  const inp = document.getElementById('input');
  const text = inp.value.trim();
  if (!text) return;
  const isRecur = document.getElementById('chkRecur').checked;
  const recurType = document.getElementById('selRecur').value;
  tasks.unshift({
    id: Date.now().toString(36) + Math.random().toString(36).substr(2,4),
    text,
    tag: 'A Fazer',
    done: false,
    date: '',
    time: '',
    createdAt: new Date().toISOString(),
    completedAt: null,
    recur: isRecur ? recurType : null
  });
  save(); inp.value = ''; render();
}

function toggle(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  t.done = !t.done;
  if (t.done) {
    t.tag = 'Feito';
    t.completedAt = new Date().toISOString();
    // If recurring, create next occurrence
    if (t.recur) {
      const days = RECUR_DAYS[t.recur] || 7;
      tasks.unshift({
        id: Date.now().toString(36) + Math.random().toString(36).substr(2,4),
        text: t.text,
        tag: 'A Fazer',
        done: false,
        date: '',
        time: '',
        createdAt: new Date().toISOString(),
        completedAt: null,
        recur: t.recur
      });
    }
  } else {
    t.tag = 'A Fazer';
    t.completedAt = null;
  }
  save(); render();
}

function cycleTag(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  const oldTag = t.tag;
  t.tag = TAG_NEXT[t.tag] || 'A Fazer';
  t.done = t.tag === 'Feito';
  if (t.tag === 'Feito' && !t.completedAt) {
    t.completedAt = new Date().toISOString();
    // If recurring, create next occurrence
    if (t.recur) {
      const days = RECUR_DAYS[t.recur] || 7;
      tasks.unshift({
        id: Date.now().toString(36) + Math.random().toString(36).substr(2,4),
        text: t.text,
        tag: 'A Fazer',
        done: false,
        date: '',
        time: '',
        createdAt: new Date().toISOString(),
        completedAt: null,
        recur: t.recur
      });
    }
  }
  if (t.tag !== 'Feito') t.completedAt = null;
  save(); render();
}

function remove(id) {
  tasks = tasks.filter(x => x.id !== id);
  save(); render();
}

function setDate(id, date, time) {
  const t = tasks.find(x => x.id === id);
  if (t) { t.date = date; t.time = time; save(); render(); }
}

function openGCal(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  let d = t.date ? t.date.replace(/-/g, '') : new Date().toISOString().slice(0,10).replace(/-/g,'');
  let timeStart = t.time ? t.time.replace(':','') + '00' : '090000';
  let h = parseInt(timeStart.substr(0,2));
  let timeEnd = String(h+1).padStart(2,'0') + timeStart.substr(2);
  let recParam = '';
  if (t.recur === 'semanal') recParam = '&recur=RRULE:FREQ=WEEKLY';
  else if (t.recur === 'quinzenal') recParam = '&recur=RRULE:FREQ=WEEKLY;INTERVAL=2';
  else if (t.recur === 'mensal') recParam = '&recur=RRULE:FREQ=MONTHLY';
  const url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(t.text)}&dates=${d}T${timeStart}/${d}T${timeEnd}${recParam}`;
  window.open(url, '_blank');
}

function downloadICS(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  let d = t.date || new Date().toISOString().slice(0,10);
  let dc = d.replace(/-/g,'');
  let ts = t.time ? t.time.replace(':','')+'00' : '090000';
  let h = parseInt(ts.substr(0,2));
  let te = String(h+1).padStart(2,'0') + ts.substr(2);
  let rrule = '';
  if (t.recur === 'semanal') rrule = '\r\nRRULE:FREQ=WEEKLY';
  else if (t.recur === 'quinzenal') rrule = '\r\nRRULE:FREQ=WEEKLY;INTERVAL=2';
  else if (t.recur === 'mensal') rrule = '\r\nRRULE:FREQ=MONTHLY';
  let ics = `BEGIN:VCALENDAR\r\nVERSION:2.0\r\nBEGIN:VEVENT\r\nDTSTART:${dc}T${ts}\r\nDTEND:${dc}T${te}\r\nSUMMARY:${t.text}${rrule}\r\nEND:VEVENT\r\nEND:VCALENDAR`;
  const blob = new Blob([ics], {type:'text/calendar'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = t.text.replace(/\s+/g,'-').substring(0,20) + '.ics';
  a.click();
}

function setFilter(f) { filter = f; render(); }

function render() {
  // Filters
  const counts = { todas: tasks.length };
  TAGS.forEach(tag => counts[tag] = tasks.filter(t => t.tag === tag).length);
  const fc = document.getElementById('filters');
  fc.innerHTML = ['todas', ...TAGS].map(f =>
    `<button class="filter-chip ${filter===f?'active':''}" onclick="setFilter('${f}')">${f === 'todas' ? 'Todas' : f}<span class="n">${counts[f]||0}</span></button>`
  ).join('');

  // Stats
  const done = tasks.filter(t => t.done).length;
  const recurring = tasks.filter(t => t.recur && !t.done).length;
  let avgTime = '';
  const completed = tasks.filter(t => t.completedAt && t.createdAt);
  if (completed.length) {
    const totalMs = completed.reduce((s, t) => s + (new Date(t.completedAt) - new Date(t.createdAt)), 0);
    avgTime = ` Â· Tempo mÃ©dio: <b>${tempoExec(new Date(0).toISOString(), new Date(totalMs / completed.length).toISOString())}</b>`;
  }
  document.getElementById('stats').innerHTML =
    `<span><b>${tasks.length}</b> tarefas</span><span><b>${done}</b> feitas</span><span><b>${tasks.length - done}</b> pendentes</span>` +
    (recurring ? `<span>ð <b>${recurring}</b> recorrentes</span>` : '') +
    avgTime;

  // List
  const filtered = filter === 'todas' ? tasks : tasks.filter(t => t.tag === filter);
  const list = document.getElementById('list');
  if (!filtered.length) { list.innerHTML = '<div class="empty">Nothing here yet. Type above and hit Enter!</div>'; return; }

  list.innerHTML = filtered.map(t => {
    const meta = [];
    if (t.createdAt) meta.push('Criada: ' + fmtDate(t.createdAt));
    if (t.completedAt) meta.push('ConcluÃ­da: ' + fmtDate(t.completedAt));
    if (t.completedAt && t.createdAt) meta.push('<span class="tempo">â± ' + tempoExec(t.createdAt, t.completedAt) + '</span>');

    return `<div class="task-wrap">
      <div class="task ${t.done ? 'done' : ''}">
        <div class="check ${t.done ? 'on' : ''}" onclick="toggle('${t.id}')">${t.done ? 'â' : ''}</div>
        <div class="task-body">
          <span class="task-text">${esc(t.text)}</span>
          <div class="task-meta">
            ${meta.join(' Â· ')}
            ${t.recur ? `<span class="recur-badge">ð ${t.recur}</span>` : ''}
          </div>
        </div>
        <span class="tag ${TAG_CLASS[t.tag]}" onclick="cycleTag('${t.id}')" title="Clique pra mudar">${t.tag}</span>
        ${t.date ? `<button class="cal-btn" onclick="openGCal('${t.id}')" title="Abrir no Google Calendar">ð GCal</button>` : ''}
        ${t.date ? `<button class="cal-btn" onclick="downloadICS('${t.id}')" title="Baixar .ics pro Apple Calendar">ð iCal</button>` : ''}
        <div class="task-actions">
          <button class="act-btn" onclick="promptDate('${t.id}')" title="Agendar">ð</button>
          <button class="act-btn del" onclick="remove('${t.id}')" title="Remover">â</button>
        </div>
      </div>
      <div class="date-row" id="dr-${t.id}">
        <label>Data:</label>
        <input type="date" id="dd-${t.id}" value="${t.date}" onchange="setDate('${t.id}', this.value, document.getElementById('dt-${t.id}').value)">
        <label>Hora:</label>
        <input type="time" id="dt-${t.id}" value="${t.time}" onchange="setDate('${t.id}', document.getElementById('dd-${t.id}').value, this.value)">
      </div>
    </div>`;
  }).join('');
}

function promptDate(id) {
  const el = document.getElementById('dr-' + id);
  el.classList.toggle('show');
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// Migrate old tasks that don't have createdAt
tasks.forEach(t => {
  if (!t.createdAt) t.createdAt = new Date().toISOString();
  if (t.done && !t.completedAt) t.completedAt = new Date().toISOString();
});
save();

render();
</script>
</body>
</html>
